                                    return (
                                        <div key={i} className="flex gap-4 relative z-10">
                                            <div className={`w-10 h-10 rounded-full flex items-center justify-center border-2 shrink-0 ${item.nata ? 'bg-yellow-50 border-yellow-200 text-yellow-600' : item.highlight ? 'bg-blue-50 border-blue-200 text-blue-600' : 'bg-white border-gray-50 text-gray-400'}`}>
                                                <IconComponent />
                                            </div>
                                            <div>
                                                <div className="flex items-center gap-2">
                                                    <h4 className={`font-bold text-sm ${item.nata?'text-yellow-800':item.highlight?'text-blue-700':'text-gray-800'}`}>{item.title}</h4>
                                                    <span className="text-[10px] text-gray-400 font-mono">{item.time}</span>
                                                </div>
                                                <p className="text-xs text-gray-500 mt-1.5 leading-relaxed">{renderMarkdown(item.desc)}</p>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    </div>
                );
            };

            const renderBudget = () => (
                <div className="p-6 pb-24 space-y-6 animate-fade-in bg-gray-50 min-h-screen">
                    <h2 className="text-2xl font-black text-gray-900 mt-2">현지 예산 현황</h2>
                    <div className="bg-gray-900 rounded-[2rem] p-8 text-white shadow-2xl relative overflow-hidden">
                        <div className="absolute -right-10 -top-10 w-40 h-40 bg-white/5 rounded-full"></div>
                        <p className="text-xs text-gray-400 font-bold mb-2">남은 가용 예산 (Total Available)</p>
                        <h3 className="text-3xl font-black text-green-400">₩ {BUDGET_DATA.summary.available.toLocaleString()}</h3>
                        <div className="mt-8 pt-6 border-t border-gray-800 grid grid-cols-2 gap-6">
                            <div>
                                <p className="text-[10px] text-gray-500 mb-1">1일 가용액(KRW)</p>
                                <p className="font-bold text-lg">₩ {BUDGET_DATA.summary.daily_krw.toLocaleString()}</p>
                            </div>
                            <div>
                                <p className="text-[10px] text-gray-500 mb-1">1일 가용액(EUR)</p>
                                <p className="font-bold text-lg text-yellow-400">€ {BUDGET_DATA.summary.daily_eur}</p>
                            </div>
                        </div>
                    </div>
                    
                    <h3 className="font-bold text-gray-800 ml-1 mt-8">현지 결제 예정 (Pending)</h3>
                    <div className="space-y-3">
                        {BUDGET_DATA.pending_list.map((item, idx) => (
                            <div key={idx} className="bg-white p-4 rounded-2xl shadow-sm border border-red-50 flex justify-between items-center">
                                <span className="text-sm font-bold text-gray-700">{item.name}</span>
                                <div className="text-right">
                                    <div className="text-sm font-black">₩ {item.krw.toLocaleString()}</div>
                                    {item.eur !== "-" && <div className="text-[10px] text-red-500 font-bold">{item.eur}</div>}
                                </div>
                            </div>
                        ))}
                    </div>
                    
                    <div className="bg-blue-50 p-5 rounded-2xl border border-blue-100 flex items-start gap-3 mt-6">
                        <span className="text-blue-500 shrink-0 mt-0.5"><Icons.Info /></span>
                        <p className="text-xs text-blue-800 leading-relaxed font-medium">항공/숙박 선결제금 약 512만원을 제외한 <strong className="font-extrabold bg-blue-100 px-1 rounded">2,365,031원</strong>이 현지 생활비로 남았습니다.</p>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen bg-gray-50 max-w-md mx-auto shadow-2xl relative flex flex-col font-sans">
                    <div className="flex-1 overflow-y-auto no-scrollbar">
                        {currentTab === 'home' && !selectedCity && renderHome()}
                        {currentTab === 'home' && selectedCity && renderCityDetail()}
                        {currentTab === 'budget' && renderBudget()}
                    </div>
                    
                    {/* 하단 네비게이션 탭 (지역별 탭 복구) */}
                    <div className="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md bg-white border-t border-gray-100 flex justify-around py-3 z-50 shadow-[0_-10px_30px_-15px_rgba(0,0,0,0.05)]">
                        <button onClick={() => { setCurrentTab('home'); setSelectedCity(null); }} className={`flex flex-col items-center gap-1.5 px-3 py-1 ${currentTab==='home' && !selectedCity ?'text-blue-600':'text-gray-400'}`}>
                            <Icons.Home />
                            <span className="text-[9px] font-bold">홈</span>
                        </button>
                        <button onClick={() => { setCurrentTab('home'); setSelectedCity('리스본'); setActiveDayIndex(0); window.scrollTo(0,0); }} className={`flex flex-col items-center gap-1.5 px-3 py-1 ${selectedCity==='리스본'?'text-blue-600':'text-gray-400'}`}>
                            <Icons.MapPin />
                            <span className="text-[9px] font-bold">리스본</span>
                        </button>
                        <button onClick={() => { setCurrentTab('home'); setSelectedCity('라고스'); setActiveDayIndex(0); window.scrollTo(0,0); }} className={`flex flex-col items-center gap-1.5 px-3 py-1 ${selectedCity==='라고스'?'text-blue-600':'text-gray-400'}`}>
                            <Icons.Sun />
                            <span className="text-[9px] font-bold">라고스</span>
                        </button>
                        <button onClick={() => { setCurrentTab('home'); setSelectedCity('포르투'); setActiveDayIndex(0); window.scrollTo(0,0); }} className={`flex flex-col items-center gap-1.5 px-3 py-1 ${selectedCity==='포르투'?'text-blue-600':'text-gray-400'}`}>
                            <Icons.Wine />
                            <span className="text-[9px] font-bold">포르투</span>
                        </button>
                        <button onClick={() => { setCurrentTab('home'); setSelectedCity('마지막 날'); setActiveDayIndex(0); window.scrollTo(0,0); }} className={`flex flex-col items-center gap-1.5 px-3 py-1 ${selectedCity==='마지막 날'?'text-blue-600':'text-gray-400'}`}>
                            <Icons.Plane />
                            <span className="text-[9px] font-bold">귀국일</span>
                        </button>
                        <button onClick={() => { setCurrentTab('budget'); setSelectedCity(null); }} className={`flex flex-col items-center gap-1.5 px-3 py-1 ${currentTab==='budget'?'text-blue-600':'text-gray-400'}`}>
                            <Icons.Wallet />
                            <span className="text-[9px] font-bold">예산</span>
                        </button>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
