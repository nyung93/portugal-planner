<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>포르투갈 여행 가이드 - 하드코어 30대 버전</title>
    <!-- React 및 도구들 불러오기 (설치 없이 실행) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide React 전용 라이브러리로 교체 -->
    <script src="https://unpkg.com/lucide-react"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        // LucideReact 글로벌 객체에서 아이콘 추출
        const { 
            Plane, Train, Bus, MapPin, Sun, CloudSun, Target, 
            Utensils, Bed, Camera, ChevronRight, Wallet, 
            Ticket, Coffee, ShoppingBag, Home, Wine,
            Bell, Check, AlertCircle, ChefHat, Info, CreditCard, Landmark
        } = LucideReact;

        // 이미지 데이터
        const IMAGES = {
            "리스본": "https://images.unsplash.com/photo-1585208798174-6cedd86e019a?q=80&w=800&auto=format&fit=crop",
            "라고스": "https://images.unsplash.com/photo-1521404092419-dbca35cfdbcc?q=80&w=800&auto=format&fit=crop",
            "포르투": "https://images.unsplash.com/photo-1555881400-74d7acaacd81?q=80&w=800&auto=format&fit=crop",
            "마지막 날": "https://images.unsplash.com/photo-1613374244243-7f722a61356f?q=80&w=800&auto=format&fit=crop",
            intro: "https://images.unsplash.com/photo-1548705085-101177834f47?q=80&w=800&auto=format&fit=crop"
        };

        const TRAVEL_DATA = {
            "리스본": {
                engName: "Lisbon", desc: "7대 언덕 도장깨기",
                weather: { temp: "24°", cond: "맑음", icon: Sun, iconColor: "text-yellow-500" },
                days: [
                    { date: "5.29 (금)", title: "도착 및 밤마실", timeline: [
                        { time: "20:15", icon: Plane, title: "리스본 공항 도착", desc: "KE921 도착 및 입국 심사 완료", budget: "Paid" },
                        { time: "22:00", icon: Home, title: "숙소 체크인", desc: "Bela Lisboa 체크인 및 **잔금 결제(260 EUR)**", highlight: true, budget: "Pending" },
                        { time: "🎯", icon: Target, title: "1일 1나타: Fábrica da Nata", desc: "3대장 중 하나. 늦게까지 영업하는 지점!", nata: true, budget: "변동" }
                    ] },
                    { date: "5.30 (토)", title: "하드코어 도심 (2.5만보)", timeline: [
                        { time: "11:00", icon: Camera, title: "제로니무스 수도원", desc: "**리스보아 카드 개시!** 웅장한 수도원 관람", budget: "Pending" },
                        { time: "🎯", icon: Target, title: "1일 1나타: Pastéis de Belém", desc: "**최고존엄 본점.** 수도원 후 폭풍 흡입!", nata: true, budget: "변동" },
                        { time: "19:30", icon: Utensils, title: "저녁: El-Rei Dom Frango", desc: "포르투갈식 닭구이 만찬", budget: "변동" }
                    ] }
                ],
                transport: { toNext: "라고스", method: "버스/기차", time: "오전 출발", duration: "약 4시간", cost: "50,000원", loc: "예정" }
            },
            "라고스": {
                engName: "Lagos", desc: "대서양 절벽 하이킹",
                weather: { temp: "26°", cond: "화창", icon: Sun, iconColor: "text-orange-500" },
                days: [
                    { date: "6.01 (월)", title: "도착 및 해안 절벽", timeline: [
                        { time: "13:00", icon: Camera, title: "폰타 다 피에다데", desc: "세계 10대 해변 하이킹 및 일몰 감상", highlight: true },
                        { time: "19:30", icon: ChefHat, title: "🍳 Home Cooking 1", desc: "Pingo Doce 마트 장보기 후 **숙소 집밥**", highlight: true, budget: "변동" }
                    ] },
                    { date: "6.02 (화)", title: "베나길 카약 액티비티", timeline: [
                        { time: "11:00", icon: Ticket, title: "베나길 동굴 (카약)", desc: "**직접 노 저어 가기!** (잔금 70 EUR 예상)", budget: "Pending" },
                        { time: "19:00", icon: Utensils, title: "저녁: Casinha do Petisco", desc: "해산물 스튜 '카타플라나'", budget: "변동" }
                    ] }
                ],
                transport: { toNext: "포르투", method: "1등석 기차", time: "오후", duration: "7.5h+", cost: "101 EUR", loc: "잔금" }
            },
            "포르투": {
                engName: "Porto", desc: "낭만 도시 & 야경",
                weather: { temp: "22°", cond: "구름", icon: CloudSun, iconColor: "text-blue-400" },
                days: [
                    { date: "6.04 (목)", title: "랜드마크 싹쓸이", timeline: [
                        { time: "10:30", icon: Camera, title: "명소 3대장", desc: "렐루 서점 ➔ 카르무 성당 ➔ 클레리고스 탑" },
                        { time: "🎯", icon: Target, title: "1일 1나타: Natas D'Ouro", desc: "포트와인 맛 나타 도전!", nata: true, budget: "변동" },
                        { time: "19:00", icon: Utensils, title: "동루이스 다리 야경", desc: "강변에서 스테이크와 와인" }
                    ] },
                    { date: "6.06 (토)", title: "가이아 & 집밥 2차", timeline: [
                        { time: "15:00", icon: Wine, title: "와이너리 투어", desc: "포트와인 시음 및 가이아 숙소 이동" },
                        { time: "19:30", icon: ChefHat, title: "🍳 Home Cooking 2", desc: "가이아 숙소에서 와인 파티!", highlight: true, budget: "변동" }
                    ] }
                ]
            }
        };

        const BUDGET_DATA = {
            summary: {
                total: 9000000, paid: 5120953, pending: 1514016, available: 2365031,
                daily_krw: 236500, daily_avg_eur: 138
            },
            pending_list: [
                { name: "리스본 숙소 잔금", krw: 445120, eur: "260 EUR" },
                { name: "라고스 ➔ 포르투 (1등석)", krw: 172912, eur: "101 EUR" },
                { name: "신트라/그린와인 투어", krw: 540000, eur: "-" },
                { name: "베나길 투어 잔금", krw: 119840, eur: "70 EUR" }
            ]
        };

        function App() {
            const [currentTab, setCurrentTab] = useState('home');
            const [selectedCity, setSelectedCity] = useState(null);
            const [activeDayIndex, setActiveDayIndex] = useState(0);

            const renderMarkdown = (text) => {
                const parts = text.split(/(\*\*.*?\*\*)/g);
                return parts.map((part, i) => {
                    if (part.startsWith('**') && part.endsWith('**')) {
                        return <strong key={i} className="text-gray-900 font-extrabold bg-yellow-50 px-1 rounded">{part.slice(2, -2)}</strong>;
                    }
                    return part;
                });
            };

            const renderHome = () => (
                <div className="pb-24 animate-fade-in">
                    <div className="relative h-72 w-full bg-gray-900">
                        <img src={IMAGES.intro} className="w-full h-full object-cover opacity-80" alt="Intro" />
                        <div className="absolute inset-0 bg-black/40 flex flex-col justify-center items-center text-white text-center p-4">
                            <span className="bg-yellow-500 text-yellow-900 text-[10px] font-bold px-3 py-1 rounded-full mb-3 shadow-lg">#30대_하드코어 #1일1나타</span>
                            <h1 className="text-4xl font-extrabold mb-2 tracking-tight">포르투갈<br/>도장깨기 플랜</h1>
                            <p className="text-xs font-light opacity-90 border border-white/30 px-4 py-1.5 rounded-full mt-2">2026.05.29 - 06.07</p>
                        </div>
                    </div>
                    <div className="px-5 -mt-8 relative z-10 space-y-4">
                        <div className="bg-white p-5 rounded-3xl shadow-xl border border-gray-100">
                            <h3 className="font-bold text-gray-800 flex items-center gap-2 mb-3"><Plane size={18} className="text-blue-500"/> 전체 여정 개요</h3>
                            <div className="space-y-3 text-xs">
                                <div className="flex justify-between"><span>출국 (5/29)</span><span className="font-bold">13:00 ICN ➔ 20:15 LIS</span></div>
                                <div className="flex justify-between"><span>귀국 (6/07)</span><span className="font-bold">22:30 LIS ➔ 18:00 ICN</span></div>
                            </div>
                        </div>
                        <h3 className="font-bold text-gray-800 ml-1 mt-6">도시별 일정</h3>
                        {Object.keys(TRAVEL_DATA).map(city => (
                            <div key={city} onClick={() => { setSelectedCity(city); setActiveDayIndex(0); }} className="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex items-center justify-between cursor-pointer active:scale-95 transition">
                                <div className="flex items-center gap-4">
                                    <img src={IMAGES[city]} className="w-14 h-14 rounded-xl object-cover" alt={city} />
                                    <div>
                                        <h4 className="font-bold text-gray-800">{city}</h4>
                                        <p className="text-[10px] text-gray-400">{TRAVEL_DATA[city].engName}</p>
                                    </div>
                                </div>
                                <ChevronRight className="text-gray-300" size={18} />
                            </div>
                        ))}
                    </div>
                </div>
            );

            const renderCityDetail = () => {
                const data = TRAVEL_DATA[selectedCity];
                const currentDay = data.days[activeDayIndex];
                return (
                    <div className="pb-24 bg-gray-50 min-h-screen animate-fade-in">
                        <div className="relative h-56 w-full bg-gray-900 rounded-b-[2.5rem] shadow-lg">
                            <img src={IMAGES[selectedCity]} className="w-full h-full object-cover opacity-70 rounded-b-[2.5rem]" alt={selectedCity} />
                            <div className="absolute inset-0 flex flex-col justify-end p-8 text-white bg-gradient-to-t from-black/80 to-transparent">
                                <h2 className="text-3xl font-black">{selectedCity}</h2>
                                <p className="text-xs opacity-90 mt-1">{data.desc}</p>
                            </div>
                        </div>
                        <div className="px-5 mt-6">
                            <div className="flex gap-2 overflow-x-auto no-scrollbar mb-6 pb-2">
                                {data.days.map((day, idx) => (
                                    <button key={idx} onClick={() => setActiveDayIndex(idx)}
                                        className={`flex-shrink-0 px-5 py-2.5 rounded-full text-xs font-bold transition-all shadow-sm ${activeDayIndex === idx ? 'bg-gray-800 text-white' : 'bg-white text-gray-400'}`}>
                                        {day.date}
                                    </button>
                                ))}
                            </div>
                            <div className="bg-white rounded-[2rem] p-6 shadow-sm border border-gray-100 space-y-8 relative">
                                <div className="absolute left-10 top-10 bottom-10 w-px bg-gray-100"></div>
                                {currentDay.timeline.map((item, i) => {
                                    const IconComponent = item.icon;
                                    return (
                                        <div key={i} className="flex gap-4 relative z-10">
                                            <div className={`w-10 h-10 rounded-full flex items-center justify-center border-2 shrink-0 ${item.nata ? 'bg-yellow-50 border-yellow-200 text-yellow-600' : item.highlight ? 'bg-blue-50 border-blue-200 text-blue-600' : 'bg-white border-gray-50 text-gray-300'}`}>
                                                {item.nata ? <Target size={18}/> : IconComponent ? <IconComponent size={18} /> : <MapPin size={18} />}
                                            </div>
                                            <div>
                                                <div className="flex items-center gap-2">
                                                    <h4 className={`font-bold text-sm ${item.nata?'text-yellow-800':item.highlight?'text-blue-700':'text-gray-800'}`}>{item.title}</h4>
                                                    <span className="text-[10px] text-gray-400 font-mono">{item.time}</span>
                                                </div>
                                                <p className="text-xs text-gray-500 mt-1.5 leading-relaxed">{renderMarkdown(item.desc)}</p>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    </div>
                );
            };

            const renderBudget = () => (
                <div className="p-6 pb-24 space-y-6 animate-fade-in bg-gray-50 min-h-screen">
                    <h2 className="text-2xl font-black text-gray-900 mt-2">현지 예산 현황</h2>
                    <div className="bg-gray-900 rounded-[2rem] p-8 text-white shadow-2xl relative overflow-hidden">
                        <div className="absolute -right-10 -top-10 w-40 h-40 bg-white/5 rounded-full"></div>
                        <p className="text-xs text-gray-400 font-bold mb-2">남은 가용 예산 (Total Available)</p>
                        <h3 className="text-3xl font-black text-green-400">₩ {BUDGET_DATA.summary.available.toLocaleString()}</h3>
                        <div className="mt-8 pt-6 border-t border-gray-800 grid grid-cols-2 gap-6">
                            <div><p className="text-[10px] text-gray-500 mb-1">1일 가용액(KRW)</p><p className="font-bold text-lg">₩ {BUDGET_DATA.summary.daily_krw.toLocaleString()}</p></div>
                            <div><p className="text-[10px] text-gray-500 mb-1">1일 가용액(EUR)</p><p className="font-bold text-lg text-yellow-400">€ {BUDGET_DATA.summary.daily_avg_eur}</p></div>
                        </div>
                    </div>
                    <h3 className="font-bold text-gray-800 ml-1">현지 결제 예정 (Pending)</h3>
                    <div className="space-y-3">
                        {BUDGET_DATA.pending_list.map((item, idx) => (
                            <div key={idx} className="bg-white p-4 rounded-2xl shadow-sm border border-red-50 flex justify-between items-center">
                                <span className="text-sm font-bold text-gray-700">{item.name}</span>
                                <div className="text-right">
                                    <div className="text-sm font-black">₩ {item.krw.toLocaleString()}</div>
                                    {item.eur !== "-" && <div className="text-[10px] text-red-500 font-bold">{item.eur}</div>}
                                </div>
                            </div>
                        ))}
                    </div>
                    <div className="bg-blue-50 p-5 rounded-2xl border border-blue-100 flex items-start gap-3">
                        <Info className="text-blue-500 shrink-0" size={20}/>
                        <p className="text-xs text-blue-800 leading-relaxed font-medium">항공/숙박 선결제금 약 512만원을 제외한 **2,365,031원**이 현지 생활비로 남았습니다.</p>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen bg-gray-50 max-w-md mx-auto shadow-2xl relative flex flex-col font-sans">
                    <div className="flex-1 overflow-y-auto no-scrollbar">
                        {currentTab === 'home' && !selectedCity && renderHome()}
                        {currentTab === 'home' && selectedCity && renderCityDetail()}
                        {currentTab === 'budget' && renderBudget()}
                    </div>
                    <div className="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md bg-white border-t border-gray-100 flex justify-around py-4 z-50 shadow-[0_-10px_30px_-15px_rgba(0,0,0,0.1)]">
                        <button onClick={() => { setCurrentTab('home'); setSelectedCity(null); }} className={`flex flex-col items-center gap-1.5 ${currentTab==='home'?'text-blue-600':'text-gray-300'}`}><Home size={22}/><span className="text-[10px] font-bold">홈</span></button>
                        <button onClick={() => { setCurrentTab('budget'); setSelectedCity(null); }} className={`flex flex-col items-center gap-1.5 ${currentTab==='budget'?'text-blue-600':'text-gray-300'}`}><Wallet size={22}/><span className="text-[10px] font-bold">예산</span></button>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
